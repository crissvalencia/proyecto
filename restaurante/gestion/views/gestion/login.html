{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - RestaurantProMax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-container { 
            background: white; 
            padding: 2.5rem 2rem; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
        }
        .login-header { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        .login-header h2 {
            margin: 0 0 0.5rem 0;
            color: #2c3e50;
        }
        .login-header p {
            margin: 0;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .btn-primary { 
            width: 100%; 
            padding: 0.8rem; 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #45a049;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #34495e;
            font-weight: 500;
        }
        input[type="text"], 
        input[type="password"] { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: inherit;
        }
        input[type="text"]:focus, 
        input[type="password"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }
        .alert-error { 
            background-color: #fcf1f1; 
            color: #d93025; 
            padding: 0.8rem; 
            border-radius: 4px; 
            border: 1px solid #f9d3d3; 
            margin-bottom: 1.5rem; 
            font-size: 0.9rem;
        }
        .errorlist { 
            list-style-type: none; 
            padding-left: 0; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>RestaurantProMax</h2>
            <p>Ingresa tus credenciales para continuar</p>
        </div>
        
        {% if form.non_field_errors %}
        <div class="alert-error">
            {{ form.non_field_errors }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Usuario:</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Contraseña:</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
    </div>
</body>
</html>
