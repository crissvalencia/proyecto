{% extends "gestion/base.html" %}
{% block title %}{{ titulo }} - RestaurantPro{% endblock %}
{% block content %}
<div class="page-header">
    <h1><span class="icon"><i class="fas fa-tags"></i></span> {{ titulo }}</h1>
</div>
<div class="form-container">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre</label>
            {{ form.nombre }}
        </div>
        <div class="form-group">
            <label>Descripción</label>
            {{ form.descripcion }}
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
            <a href="{% url 'categoria_list' %}" class="btn btn-secondary"><i class="fas fa-times"></i> Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
